<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>eBay Listing Assistant</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }
    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
    }
    input, button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      margin-top: 8px;
      font-size: 16px;
    }
    input { background: #334155; color: white; }
    button {
      background: #7c3aed;
      color: white;
      font-weight: bold;
    }
    .muted { color: #cbd5e1; font-size: 14px; }
  </style>
</head>
<body>
  <h1>eBay Listing Assistant</h1>

  <div class="card">
    <div>Ürün ara</div>
    <input id="keyword" placeholder="örn: led" />
    <button onclick="searchProducts()">Ara</button>
  </div>

  <div id="results"></div>

  <script>
    async function searchProducts() {
      const keyword = document.getElementById("keyword").value || "";
      const res = await fetch("/search?q=" + encodeURIComponent(keyword));
      const data = await res.json();

      const results = document.getElementById("results");
      results.innerHTML = "";

      data.forEach(item => {
  const el = document.createElement("div");
  el.className = "card";
  el.innerHTML = `
    <h3>${item.name}</h3>
    <div class="muted">Kar: ${item.profit}</div>
    <div class="muted">Talep: ${item.demand}</div>
    <div class="muted">Risk: ${item.risk}</div>
    <button onclick="alert('Eklendi: ${item.name}')">Listeye ekle</button>
  `;
  results.appendChild(el);
});
    }
  </script>
</body>
</html>
