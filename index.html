<!doctype html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>eBay Listing Assistant</title>

<style>
body {
  font-family: Arial;
  background:#0f172a;
  color:white;
  margin:0;
  padding:20px;
}

h1 { margin-bottom:20px; }

.tabs {
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.tab {
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#7c3aed;
  color:white;
  font-weight:bold;
}

.card {
  background:#1e293b;
  padding:16px;
  border-radius:16px;
  margin-bottom:12px;
}

input, button {
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  margin-top:8px;
}

input { background:#334155; color:white; }

.btn {
  background:#7c3aed;
  color:white;
  font-weight:bold;
}

.btn-secondary {
  background:#475569;
}

.btn-danger {
  background:#dc2626;
}
</style>
</head>

<body>

<h1>eBay Listing Assistant</h1>

<div class="tabs">
  <button class="tab" onclick="showSearch()">Ürün Ara</button>
  <button class="tab" onclick="showList()">Listem</button>
</div>

<div id="status"></div>

<div id="searchView">
  <div class="card">
    <div>Ürün ara</div>
    <input id="searchInput" placeholder="örn: led"/>
    <button class="btn" onclick="search()">Ara</button>
  </div>

  <div id="results"></div>
</div>

<div id="listView" style="display:none;">
  <h2>Kaydedilen Ürünler</h2>
  <div id="listings"></div>
</div>

<script>
function setStatus(t){ document.getElementById("status").innerText = t; }

function showSearch(){
  document.getElementById("searchView").style.display="block";
  document.getElementById("listView").style.display="none";
}

function showList(){
  document.getElementById("searchView").style.display="none";
  document.getElementById("listView").style.display="block";
  loadListings();
}

async function search(){
  const q = document.getElementById("searchInput").value;
  const res = await fetch("/search?q="+q);
  const data = await res.json();

  const container = document.getElementById("results");
  container.innerHTML="";

  data.forEach(item=>{
    const div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      <h3>${item.name}</h3>
      <div>Kar: ${item.profit}</div>
      <div>Talep: ${item.demand}</div>
      <div>Risk: ${item.risk}</div>

      <button class="btn" onclick='addListing(${JSON.stringify(item)})'>Listeye ekle</button>
      <button class="btn-secondary" onclick='analyzeProduct(${JSON.stringify(item)})'>AI Analiz</button>
    `;

    container.appendChild(div);
  });
}

async function addListing(item){
  await fetch("/add-listing",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify(item)
  });

  alert("Eklendi");
}

async function loadListings(){
  const res = await fetch("/listings");
  const data = await res.json();

  const container = document.getElementById("listings");
  container.innerHTML="";

  data.forEach(item=>{
    const div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      <h3>${item.name}</h3>
      <div>Kar: ${item.profit}</div>
      <div>Talep: ${item.demand}</div>
      <div>Risk: ${item.risk}</div>
      <button class="btn-danger" onclick="deleteListing(${item.id})">Sil</button>
    `;

    container.appendChild(div);
  });
}

async function deleteListing(id){
  await fetch("/delete-listing/"+id,{ method:"DELETE" });
  loadListings();
}

async function analyzeProduct(item){
  try{
    setStatus("AI analiz...");

    const res = await fetch("/analyze",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify(item)
    });

    const data = await res.json();

    if(data.error){
      alert("Hata: "+data.error);
      return;
    }

    alert(data.result);

    setStatus("Analiz tamamlandı");
  }catch(err){
    alert("Hata: "+err.message);
  }
}
</script>

</body>
</html>
