<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>eBay Listing Assistant</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 20px;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .top-actions button {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: #7c3aed;
      color: white;
      font-weight: bold;
    }

    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    input, button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      margin-top: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }

    input {
      background: #334155;
      color: white;
    }

    button {
      background: #7c3aed;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .secondary {
      background: #475569;
    }

    .danger {
      background: #dc2626;
    }

    .muted {
      color: #cbd5e1;
      font-size: 14px;
      margin-top: 4px;
    }

    .button-row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .status {
      margin: 12px 0;
      color: #cbd5e1;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<h1>eBay Listing Assistant</h1>

<div class="top-actions">
  <button onclick="showSearch()">Ürün Ara</button>
  <button onclick="loadListings()">Listem</button>
</div>

<div id="status" class="status"></div>

<div id="searchSection" class="card">
  <div>Ürün ara</div>
  <input id="keyword" placeholder="örn: led" />
  <button onclick="searchProducts()">Ara</button>
</div>

<div id="results"></div>

<script>

function setStatus(msg) {
  document.getElementById("status").innerText = msg || "";
}

function showSearch() {
  document.getElementById("searchSection").classList.remove("hidden");
  document.getElementById("results").innerHTML = "";
  setStatus("Ürün arama ekranı");
}

async function searchProducts() {
  const keyword = document.getElementById("keyword").value || "";
  setStatus("Aranıyor...");

  const res = await fetch("/search?q=" + keyword);
  const data = await res.json();

  const results = document.getElementById("results");
  results.innerHTML = "<h2>Bulunan Ürünler</h2>";

  data.forEach(item => {
    const el = document.createElement("div");
    el.className = "card";

    el.innerHTML = `
      <h3>${item.name}</h3>
      <div class="muted">Kar: ${item.profit}</div>
      <div class="muted">Talep: ${item.demand}</div>
      <div class="muted">Risk: ${item.risk}</div>

      <div class="button-row">
        <button onclick='addListing(${JSON.stringify(item)})'>
          Listeye ekle
        </button>

        <button class="secondary" onclick='analyzeProduct(${JSON.stringify(item)})'>
          AI Analiz
        </button>
      </div>
    `;

    results.appendChild(el);
  });

  setStatus(data.length + " ürün bulundu");
}

async function addListing(item) {
  setStatus("Ekleniyor...");

  const res = await fetch("/add-listing", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(item)
  });

  const data = await res.json();

  if (data.success) {
    setStatus("Eklendi ✅");
  } else {
    setStatus("Hata ❌");
  }
}

async function loadListings() {
  document.getElementById("searchSection").classList.add("hidden");
  setStatus("Yükleniyor...");

  const res = await fetch("/listings");
  const data = await res.json();

  const results = document.getElementById("results");
  results.innerHTML = "<h2>Kaydedilen Ürünler</h2>";

  data.forEach(item => {
    const el = document.createElement("div");
    el.className = "card";

    el.innerHTML = `
      <h3>${item.name}</h3>
      <div class="muted">Kar: ${item.profit}</div>
      <div class="muted">Talep: ${item.demand}</div>
      <div class="muted">Risk: ${item.risk}</div>

      <div class="button-row">
        <button class="danger" onclick="deleteListing(${item.id})">
          Sil
        </button>
      </div>
    `;

    results.appendChild(el);
  });

  setStatus(data.length + " kayıtlı ürün");
}

async function deleteListing(id) {
  setStatus("Siliniyor...");

  await fetch("/delete-listing/" + id, {
    method: "DELETE"
  });

  loadListings();
}

async function analyzeProduct(item) {
  setStatus("AI analiz...");

  const res = await fetch("/analyze", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(item)
  });

  const data = await res.json();

  alert(
    "Skor: " + data.score +
    "\n" + data.recommendation
  );

  setStatus("Analiz tamamlandı");
}

</script>

</body>
</html>
