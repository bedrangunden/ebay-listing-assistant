<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>eBay Listing Assistant</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 20px;
    }

    h2 {
      margin: 0 0 12px 0;
      font-size: 18px;
    }

    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    input, button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      margin-top: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }

    input {
      background: #334155;
      color: white;
    }

    button {
      background: #7c3aed;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .secondary {
      background: #475569;
    }

    .danger {
      background: #dc2626;
    }

    .muted {
      color: #cbd5e1;
      font-size: 14px;
      margin-top: 4px;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .top-actions button {
      width: auto;
      flex: 1;
    }

    .hidden {
      display: none;
    }

    .status {
      margin: 12px 0;
      color: #cbd5e1;
      font-size: 14px;
    }

    .button-row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .button-row button {
      margin-top: 0;
    }
  </style>
</head>
<body>
  <h1>eBay Listing Assistant</h1>

  <div class="top-actions">
    <button onclick="showSearch()">Ürün Ara</button>
    <button onclick="loadListings()">Listem</button>
  </div>

  <div id="status" class="status"></div>

  <div id="searchSection" class="card">
    <div>Ürün ara</div>
    <input id="keyword" placeholder="örn: led" />
    <button onclick="searchProducts()">Ara</button>
  </div>

  <div id="results"></div>

  <script>
    function setStatus(message) {
      document.getElementById("status").innerText = message || "";
    }

    function showSearch() {
      document.getElementById("searchSection").classList.remove("hidden");
      document.getElementById("results").innerHTML = "";
      setStatus("Ürün arama ekranındasın.");
    }

    async function searchProducts() {
      try {
        const keyword = document.getElementById("keyword").value || "";
        setStatus("Ürünler aranıyor...");

        const res = await fetch("/search?q=" + encodeURIComponent(keyword));
        const data = await res.json();

        const results = document.getElementById("results");
        results.innerHTML = "<h2>Bulunan Ürünler</h2>";

        if (!Array.isArray(data) || data.length === 0) {
          results.innerHTML += `<div class="card">Sonuç bulunamadı.</div>`;
          setStatus("Sonuç bulunamadı.");
          return;
        }

        data.forEach(item => {
          const el = document.createElement("div");
          el.className = "card";
          el.innerHTML = `
            <h3>${item.name}</h3>
            <div class="muted">Kar: ${item.profit}</div>
            <div class="muted">Talep: ${item.demand}</div>
            <div class="muted">Risk: ${item.risk}</div>
            <div class="button-row">
              <button onclick='addListing(${JSON.stringify(item)})'>Listeye ekle</button>
            </div>
          `;
          results.appendChild(el);
        });

        setStatus(data.length + " ürün bulundu.");
      } catch (err) {
        setStatus("Hata: " + err.message);
      }
    }

    async function addListing(item) {
      try {
        setStatus("Ürün listeye ekleniyor...");

        const res = await fetch("/add-listing", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(item)
        });

        const data = await res.json();

        if (data.success) {
          setStatus("Listeye eklendi: " + item.name);
        } else {
          setStatus("Hata: " + data.error);
        }
      } catch (err) {
        setStatus("Hata: " + err.message);
      }
    }

    async function loadListings() {
      try {
        document.getElementById("searchSection").classList.add("hidden");
        setStatus("Kaydedilen ürünler yükleniyor...");

        const res = await fetch("/listings");
        const data = await res.json();

        const results = document.getElementById("results");
        results.innerHTML = "<h2>Kaydedilen Ürünler</h2>";

        if (!Array.isArray(data) || data.length === 0) {
          results.innerHTML += `<div class="card">Henüz ürün eklenmedi.</div>`;
          setStatus("Henüz kayıtlı ürün yok.");
          return;
        }

        data.forEach(item => {
          const el = document.createElement("div");
          el.className = "card";
          el.innerHTML = `
            <h3>${item.name}</h3>
            <div class="muted">Kar: ${item.profit}</div>
            <div class="muted">Talep: ${item.demand}</div>
            <div class="muted">Risk: ${item.risk}</div>
            <div class="button-row">
              <button class="danger" onclick="deleteListing(${item.id})">Sil</button>
            </div>
          `;
          results.appendChild(el);
        });

        setStatus(data.length + " kayıtlı ürün gösteriliyor.");
      } catch (err) {
        setStatus("Hata: " + err.message);
      }
    }

    async function deleteListing(id) {
      try {
        setStatus("Ürün siliniyor...");

        const res = await fetch("/delete-listing/" + id, {
          method: "DELETE"
        });

        const data = await res.json();

        if (data.success) {
          setStatus("Ürün silindi.");
          loadListings();
        } else {
          setStatus("Hata: " + data.error);
        }
      } catch (err) {
        setStatus("Hata: " + err.message);
      }
    }
  </script>
</body>
</html>
